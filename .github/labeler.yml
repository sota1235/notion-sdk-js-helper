# ライブラリの挙動に関係ないファイルのみの変更時にラベルを付与する
# 否定パターンで「全ファイルがライブラリ関連でない」を表現
skip-changelog:
  - changed-files:
      - all-globs-to-all-files:
          - '!src/**'
          - '!package.json'
          - '!package-lock.json'
          - '!tsconfig.json'
          - '!tsconfig.publish.json'
          - '!biome.json'
          - '!vitest.config.ts'
          - '!.gitignore'
          - '!.npmignore'
          - '!LICENSE.txt'
